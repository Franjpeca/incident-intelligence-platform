version: "3.9"

services:
  # Servicio de base de datos
  postgres:
    image: postgres:15
    container_name: incident-db-service
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Microservicio de incidencias
  incident-service:
    build: ./incident-service
    container_name: incident-service
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      # Cargamos el env de cada microservicio, no machaca, esta el env de la raiz y el del microservicio
      - ./incident-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LLM_SERVICE_URL: http://llm-service:8001
    volumes:
      - ./incident-service/logs:/app/logs
      

  # Microservicio de incidencias
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      # Cargamos el env de cada microservicio, no machaca, esta el env de la raiz y el del microservicio
      - ./llm-service/.env
    volumes:  # Guardamos en local el cache de Hugging Face para evitar descargar modelos cada vez
      - hf_cache:/root/.cache/huggingface
      - ./llm-service/logs:/app/logs

  frontend:
      build: ./web
      container_name: incident-frontend
      ports:
        - "5500:80"
      depends_on:
        - incident-service
      networks:
        - app-network

volumes:
  postgres_data:
  hf_cache:

networks:
  app-network:
    driver: bridge