version: "3.9"

services:
  # Servicio de base de datos
  postgres:
    image: postgres:15
    container_name: incident-db-service
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Microservicio de incidencias
  incident-service:
    build: ./incident-service
    container_name: incident-service
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LLM_SERVICE_URL: http://llm-service:8001
    volumes:
      - ./logs:/app/logs
      

  # Microservicio de incidencias
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    env_file:
      - ./llm-service/.env
    ports:
      - "8001:8001"
    volumes:  # Guardamos en local el cache de Hugging Face para evitar descargar modelos cada vez
      - hf_cache:/root/.cache/huggingface
      - ./logs:/app/logs

volumes:
  postgres_data:
  hf_cache: