server {
    listen 80;

    # Servir los archivos estaticos de tu web
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirigir peticiones al microservicio de incidencias
    location /api/v1/ {
        proxy_pass http://incident-service:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirigir peticiones al microservicio de LLM
    location /llm/api/v1/ {
        proxy_pass http://llm-service:8001/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}