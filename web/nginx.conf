server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para incident-service
    location /api/v1 {
        proxy_pass http://incident-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy para llm-service
    location /llm/api/v1/ {
        proxy_pass http://llm-service:8001/api/v1/;
        proxy_set_header Host $host;
    }
}